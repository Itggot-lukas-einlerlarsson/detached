services:
  bluetooth-app:
    image: python:3.12-alpine
    container_name: bluetooth-app
    network_mode: host
    privileged: true
    volumes:
      - /var/run/dbus:/var/run/dbus
      - /dev:/dev
      - /var/log:/var/log
    restart: unless-stopped
    command: sh -c "apk add --no-cache bluez && sleep infinity"
